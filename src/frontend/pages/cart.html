<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - NovaCart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-white dark:bg-gray-900">
    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 w-full bg-white dark:bg-gray-800 shadow-md z-50"></nav>

    <div class="pt-20 min-h-screen">
        <div class="container mx-auto px-4 py-8">
            <h1 class="text-3xl font-bold mb-8">Shopping Cart</h1>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Cart Items -->
                <div class="lg:col-span-2">
                    <div id="cart-items" class="bg-white dark:bg-gray-800 rounded-lg shadow"></div>

                    <!-- Empty Cart Message -->
                    <div id="empty-cart" class="text-center py-12">
                        <p class="text-2xl font-semibold text-gray-600 dark:text-gray-300 mb-4">Your cart is empty</p>
                        <a href="/products.html" class="text-blue-600 hover:underline font-semibold">Continue Shopping →</a>
                    </div>
                </div>

                <!-- Cart Summary -->
                <div class="lg:col-span-1">
                    <div id="cart-summary" class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
                        <h2 class="text-xl font-bold mb-6">Order Summary</h2>

                        <div class="space-y-4 mb-4">
                            <div class="flex justify-between">
                                <span>Subtotal</span>
                                <span id="subtotal">₹0</span>
                            </div>
                            <div class="flex justify-between">
                                <span>Tax (18%)</span>
                                <span id="tax">₹0</span>
                            </div>
                            <div class="flex justify-between">
                                <span>Shipping</span>
                                <span id="shipping">Free</span>
                            </div>
                        </div>

                        <div class="border-t dark:border-gray-700 pt-4 mb-6">
                            <div class="flex justify-between text-xl font-bold">
                                <span>Total</span>
                                <span id="total">₹0</span>
                            </div>
                        </div>

                        <button onclick="window.location.href='/checkout.html'" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-700 transition">
                            Proceed to Checkout
                        </button>

                        <a href="/products.html" class="block text-center mt-4 text-blue-600 hover:underline">Continue Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer" class="bg-gray-800 text-white py-12 mt-16"></footer>

    <!-- Scripts -->
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/api/index.js"></script>
    <script src="js/components/navbar.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/pages/cart.js"></script>
</body>
</html>
