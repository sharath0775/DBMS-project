<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - NovaCart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-300">
    <nav id="navbar" class="fixed top-0 w-full bg-white dark:bg-gray-800 shadow-md z-50 transition-all duration-300"></nav>

    <main class="pt-24 pb-16">
        <div class="container mx-auto px-4">
            <div class="mb-8 flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Your Wishlist</h1>
                    <p class="text-gray-600 dark:text-gray-400">Browse saved products and move them to your cart.</p>
                </div>
            </div>

            <div id="wishlist-empty" class="hidden bg-yellow-100 border border-yellow-400 text-yellow-700 p-6 rounded-lg text-center">
                <p class="text-lg font-semibold">Your wishlist is empty.</p>
                <p class="mt-2">Start adding favorites from the <a href="/products.html" class="text-blue-600 hover:underline">products page</a>.</p>
            </div>

            <div id="wishlist-items" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>
    </main>

    <footer id="footer" class="bg-gray-800 text-white py-12"></footer>

    <script src="js/utils/storage.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/api/index.js"></script>
    <script src="js/components/navbar.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/pages/wishlist.js"></script>
</body>
</html>
