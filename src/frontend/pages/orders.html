<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - NovaCart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-white dark:bg-gray-900">
    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 w-full bg-white dark:bg-gray-800 shadow-md z-50"></nav>

    <div class="pt-20 min-h-screen">
        <div class="container mx-auto px-4 py-8">
            <h1 class="text-3xl font-bold mb-8">My Orders</h1>

            <div id="orders-container" class="space-y-6">
                <!-- Orders will be loaded here -->
            </div>

            <!-- Empty Orders Message -->
            <div id="no-orders" class="text-center py-12">
                <p class="text-2xl font-semibold text-gray-600 dark:text-gray-300 mb-4">No orders yet</p>
                <a href="/products.html" class="text-blue-600 hover:underline font-semibold">Start Shopping →</a>
            </div>

            <!-- Loading State -->
            <div id="loading" class="text-center py-8 hidden">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-blue-600"></div>
                <p class="mt-4 text-gray-600 dark:text-gray-300">Loading orders...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer" class="bg-gray-800 text-white py-12 mt-16"></footer>

    <!-- Scripts -->
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/api/index.js"></script>
    <script src="js/components/navbar.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/pages/orders.js"></script>
</body>
</html>
