<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - NovaCart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-300">
    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 w-full bg-white dark:bg-gray-800 shadow-md z-50"></nav>

    <div class="pt-20">
        <div class="container mx-auto px-4 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <!-- Filters Sidebar -->
                <div class="lg:col-span-1">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
                        <h3 class="text-xl font-bold mb-4">Filters</h3>

                        <!-- Category Filter -->
                        <div class="mb-6">
                            <label class="font-semibold block mb-3">Category</label>
                            <select id="category-filter" class="w-full p-2 border dark:bg-gray-700 dark:border-gray-600 rounded">
                                <option value="">All Categories</option>
                            </select>
                        </div>

                        <!-- Price Range Filter -->
                        <div class="mb-6">
                            <label class="font-semibold block mb-3">Price Range</label>
                            <div class="flex gap-2">
                                <input type="number" id="min-price" placeholder="Min" class="w-1/2 p-2 border dark:bg-gray-700 dark:border-gray-600 rounded">
                                <input type="number" id="max-price" placeholder="Max" class="w-1/2 p-2 border dark:bg-gray-700 dark:border-gray-600 rounded">
                            </div>
                        </div>

                        <!-- Rating Filter -->
                        <div class="mb-6">
                            <label class="font-semibold block mb-3">Rating</label>
                            <select id="rating-filter" class="w-full p-2 border dark:bg-gray-700 dark:border-gray-600 rounded">
                                <option value="">All Ratings</option>
                                <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
                                <option value="4">⭐⭐⭐⭐ 4+ Stars</option>
                                <option value="3">⭐⭐⭐ 3+ Stars</option>
                            </select>
                        </div>

                        <!-- Apply Filters Button -->
                        <button id="apply-filters" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
                            Apply Filters
                        </button>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="lg:col-span-3">
                    <!-- Sort Options -->
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-bold">Products</h1>
                        <select id="sort-select" class="p-2 border dark:bg-gray-700 dark:border-gray-600 rounded">
                            <option value="newest">Newest</option>
                            <option value="price_asc">Price: Low to High</option>
                            <option value="price_desc">Price: High to Low</option>
                            <option value="rating">Top Rated</option>
                        </select>
                    </div>

                    <!-- Products Container -->
                    <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Products will be loaded here -->
                    </div>

                    <!-- Loading State -->
                    <div id="loading" class="text-center py-8">
                        <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-blue-600"></div>
                        <p class="mt-4 text-gray-600 dark:text-gray-300">Loading products...</p>
                    </div>

                    <!-- Pagination -->
                    <div id="pagination" class="flex justify-center gap-2 mt-8"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer" class="bg-gray-800 text-white py-12 mt-16"></footer>

    <!-- Scripts -->
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/api/index.js"></script>
    <script src="js/components/navbar.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/components/productCard.js"></script>
    <script src="js/pages/products.js"></script>
</body>
</html>
