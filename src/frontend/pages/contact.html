<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - NovaCart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-300">
    <nav id="navbar" class="fixed top-0 w-full bg-white dark:bg-gray-800 shadow-md z-50 transition-all duration-300"></nav>

    <main class="pt-24 pb-16">
        <div class="container mx-auto px-4">
            <div class="max-w-3xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-lg p-10">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">Contact Us</h1>
                <p class="text-gray-600 dark:text-gray-300 mb-6">Need help or have a question? Reach out and we'll get back to you shortly.</p>

                <div class="space-y-6">
                    <div>
                        <h2 class="font-semibold text-lg text-gray-900 dark:text-white">Customer Support</h2>
                        <p class="text-gray-600 dark:text-gray-300">support@NovaCart.com</p>
                    </div>
                    <div>
                        <h2 class="font-semibold text-lg text-gray-900 dark:text-white">Phone</h2>
                        <p class="text-gray-600 dark:text-gray-300">+91 12345 67890</p>
                    </div>
                    <div>
                        <h2 class="font-semibold text-lg text-gray-900 dark:text-white">Office Address</h2>
                        <p class="text-gray-600 dark:text-gray-300">123 NovaCart Avenue, Bangalore, India</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer" class="bg-gray-800 text-white py-12"></footer>

    <script src="js/utils/storage.js"></script>
    <script src="js/components/navbar.js"></script>
    <script src="js/components/footer.js"></script>
</body>
</html>
